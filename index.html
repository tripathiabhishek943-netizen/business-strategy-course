<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Strategy Course</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0d0a4a; overflow: hidden; height: 100vh; width: 100vw; }
#root { width: 100%; height: 100%; }

.course-shell {
  width: 100vw; height: 100vh;
  background: linear-gradient(145deg, #2C37C4 0%, #1A0A82 100%);
  display: flex; flex-direction: column; position: relative; overflow: hidden;
}
.geo-bg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.geo-bg svg { position: absolute; }

/* TOP BAR */
.top-bar {
  position: relative; z-index: 10;
  display: flex; align-items: center; gap: 16px;
  padding: 14px 28px;
  background: rgba(0,0,0,0.18); backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
}
.logo-icon { width: 34px; height: 34px; background: #F5B800; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: #1A0A82; flex-shrink: 0; }
.course-title-bar { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.9); }
.section-tag { font-size: 11px; color: rgba(255,255,255,0.45); font-weight: 600; }
.progress-area { flex: 1; display: flex; align-items: center; gap: 10px; }
.progress-track { flex: 1; height: 5px; background: rgba(255,255,255,0.15); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #F5B800, #FFD54F); border-radius: 99px; transition: width 0.5s ease; }
.progress-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6); white-space: nowrap; }
.screen-counter { font-size: 12px; font-weight: 700; color: #F5B800; }

/* TTS CONTROLS */
.tts-controls { display: flex; align-items: center; gap: 6px; }
.tts-btn {
  width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08); color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  transition: all 0.2s; flex-shrink: 0;
}
.tts-btn:hover { background: rgba(255,255,255,0.18); }
.tts-btn.active { background: rgba(245,184,0,0.25); border-color: #F5B800; color: #F5B800; }
.tts-btn.muted { background: rgba(255,80,80,0.15); border-color: rgba(255,80,80,0.4); color: #f87171; }
.tts-wave {
  display: flex; align-items: center; gap: 2px; height: 18px; overflow: hidden;
}
.tts-wave span {
  display: block; width: 3px; background: #F5B800; border-radius: 2px;
  animation: wave 0.8s ease-in-out infinite;
}
.tts-wave span:nth-child(1) { height: 6px; animation-delay: 0s; }
.tts-wave span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
.tts-wave span:nth-child(3) { height: 10px; animation-delay: 0.2s; }
.tts-wave span:nth-child(4) { height: 16px; animation-delay: 0.15s; }
.tts-wave span:nth-child(5) { height: 8px; animation-delay: 0.05s; }
@keyframes wave { 0%,100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }

/* MAIN CONTENT */
.screen-content {
  flex: 1; position: relative; z-index: 5;
  display: flex; flex-direction: column;
  padding: 0 36px; overflow: hidden; min-height: 0;
}

/* BOTTOM NAV */
.bottom-nav {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 28px;
  background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
}
.vo-box {
  flex: 1; margin: 0 20px;
  font-size: 11px; color: rgba(255,255,255,0.55); font-style: italic; line-height: 1.4;
  max-height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.nav-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 20px; border-radius: 99px; border: none;
  font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.nav-btn.prev { background: rgba(255,255,255,0.12); color: white; }
.nav-btn.prev:hover { background: rgba(255,255,255,0.2); }
.nav-btn.next { background: #F5B800; color: #1A0A82; }
.nav-btn.next:hover { background: #FFD54F; transform: scale(1.03); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

/* SCREEN BASE */
.screen { display: flex; flex-direction: column; height: 100%; padding-top: 20px; }
.screen-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #F5B800; margin-bottom: 6px; }
.screen-heading { font-size: clamp(22px, 3vw, 38px); font-weight: 800; color: white; line-height: 1.1; margin-bottom: 6px; }
.screen-sub { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 18px; font-weight: 500; }

/* SCREEN 1 */
.intro-layout { display: flex; align-items: center; gap: 40px; height: 100%; }
.intro-big-text { font-size: clamp(32px, 4.5vw, 56px); font-weight: 800; color: white; line-height: 1.0; margin-bottom: 14px; }
.highlight { color: #F5B800; }
.start-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 36px; background: #F5B800; color: #1A0A82;
  border: none; border-radius: 99px; font-family: inherit;
  font-size: 16px; font-weight: 800; cursor: pointer;
  transition: all 0.25s; box-shadow: 0 8px 32px rgba(245,184,0,0.4); margin-top: 28px;
}
.start-btn:hover { background: #FFD54F; transform: translateY(-2px); box-shadow: 0 12px 40px rgba(245,184,0,0.5); }
.stat-box { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 14px 18px; flex: 1; text-align: center; }
.stat-num { font-size: 26px; font-weight: 800; color: #F5B800; }
.stat-desc { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* OBJECTIVES */
.obj-list { display: flex; flex-direction: column; gap: 14px; }
.obj-item { display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 18px 22px; animation: slideIn 0.4s ease both; }
.obj-item:nth-child(2) { animation-delay: 0.1s; }
.obj-item:nth-child(3) { animation-delay: 0.2s; }
@keyframes slideIn { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:none; } }
.obj-num { width: 38px; height: 38px; flex-shrink: 0; background: #F5B800; color: #1A0A82; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; }
.obj-text { font-size: 15px; font-weight: 600; color: white; }

/* REVEAL CARDS */
.reveal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.reveal-card { background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 20px; cursor: pointer; transition: all 0.3s; min-height: 110px; display: flex; flex-direction: column; align-items: flex-start; gap: 10px; position: relative; overflow: hidden; }
.reveal-card:hover { border-color: #F5B800; background: rgba(245,184,0,0.08); }
.reveal-card.revealed { border-color: #F5B800; background: rgba(245,184,0,0.12); }
.reveal-card-icon { font-size: 26px; }
.reveal-card-title { font-size: 16px; font-weight: 700; color: white; }
.reveal-card-body { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.5; }
.click-badge { position: absolute; top: 10px; right: 10px; background: rgba(245,184,0,0.2); color: #F5B800; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 99px; }

/* DRAG & DROP */
.dnd-cards-source { display: flex; flex-direction: column; gap: 8px; }
.dnd-zone { border: 2px dashed rgba(255,255,255,0.25); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 8px; min-height: 160px; transition: all 0.2s; }
.dnd-zone.drag-over { border-color: #F5B800; background: rgba(245,184,0,0.07); }
.dnd-zone.strategy-zone { border-color: rgba(100,180,255,0.4); }
.dnd-zone.competing-zone { border-color: rgba(255,120,120,0.4); }
.dnd-zone-header { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px; }
.zone-dot { width: 9px; height: 9px; border-radius: 50%; }
.dnd-card { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 9px; padding: 10px 14px; font-size: 13px; font-weight: 500; color: white; cursor: grab; user-select: none; transition: all 0.2s; }
.dnd-card:hover { background: rgba(255,255,255,0.18); transform: scale(1.01); }
.dnd-card.correct { background: rgba(100,220,100,0.15); border-color: rgba(100,220,100,0.5); }
.dnd-card.incorrect { background: rgba(255,80,80,0.15); border-color: rgba(255,80,80,0.5); }
.dnd-source-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 4px; }
.dnd-check-btn { padding: 9px 22px; background: #F5B800; color: #1A0A82; border: none; border-radius: 99px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.dnd-check-btn:hover { background: #FFD54F; }

/* LEVELS */
.level-item { border: 1px solid rgba(255,255,255,0.15); border-radius: 13px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
.level-item:hover { border-color: rgba(245,184,0,0.5); }
.level-item.open { border-color: #F5B800; }
.level-header { display: flex; align-items: center; gap: 14px; padding: 16px 18px; background: rgba(255,255,255,0.06); }
.level-num { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0; }
.level-title { font-size: 16px; font-weight: 700; color: white; flex: 1; }
.level-chevron { color: rgba(255,255,255,0.5); transition: transform 0.3s; font-size: 16px; }
.level-item.open .level-chevron { transform: rotate(180deg); color: #F5B800; }
.level-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease, padding 0.3s; font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.6; padding: 0 18px; background: rgba(255,255,255,0.03); }
.level-item.open .level-body { max-height: 200px; padding: 14px 18px; }

/* FLIP CARDS */
.flip-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; }
.flip-wrap { perspective: 800px; height: 170px; cursor: pointer; }
.flip-inner { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); position: relative; }
.flip-wrap.flipped .flip-inner { transform: rotateY(180deg); }
.flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 18px; }
.flip-front { background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15); }
.flip-back { background: linear-gradient(135deg, #1E3FA0, #2C37C4); border: 2px solid #F5B800; transform: rotateY(180deg); }
.flip-icon { font-size: 28px; }
.flip-label { font-size: 14px; font-weight: 700; color: white; text-align: center; }
.flip-answer { font-size: 12px; color: rgba(255,255,255,0.8); text-align: center; line-height: 1.5; }
.flip-hint { font-size: 10px; color: rgba(255,255,255,0.4); }

/* V-C SLIDER */
.vc-layout { display: flex; gap: 36px; align-items: flex-start; }
.vc-formula { background: rgba(255,255,255,0.08); border: 2px solid rgba(245,184,0,0.4); border-radius: 18px; padding: 28px 36px; text-align: center; min-width: 180px; }
.vc-eq { font-size: 44px; font-weight: 800; color: #F5B800; }
.vc-sliders { flex: 1; display: flex; flex-direction: column; gap: 20px; }
.vc-slider-label { font-size: 13px; font-weight: 600; color: white; display: flex; justify-content: space-between; }
.vc-slider-label span { color: #F5B800; font-weight: 800; }
input[type=range] { width: 100%; -webkit-appearance: none; height: 7px; border-radius: 99px; background: rgba(255,255,255,0.2); outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #F5B800; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.vc-value-num { font-size: 32px; font-weight: 800; }
.vc-value-num.positive { color: #4ade80; }
.vc-value-num.negative { color: #f87171; }
.vc-bar-wrap { background: rgba(255,255,255,0.06); border-radius: 99px; height: 12px; overflow: hidden; }
.vc-bar { height: 100%; border-radius: 99px; transition: width 0.3s; }

/* CARDS */
.cards-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.info-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.info-card-icon { font-size: 28px; }
.info-card-title { font-size: 15px; font-weight: 700; color: white; }
.info-card-body { font-size: 12px; color: rgba(255,255,255,0.65); line-height: 1.5; }

/* POSITIONING */
.pos-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; }
.pos-card { border-radius: 14px; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
.pos-card.cost { background: rgba(100,220,180,0.1); border: 2px solid rgba(100,220,180,0.3); }
.pos-card.diff { background: rgba(180,100,255,0.1); border: 2px solid rgba(180,100,255,0.3); }
.pos-card.focus { background: rgba(100,180,255,0.1); border: 2px solid rgba(100,180,255,0.3); grid-column: 1/-1; }
.pos-card.danger { background: rgba(255,80,80,0.08); border: 2px solid rgba(255,80,80,0.25); }
.pos-card-title { font-size: 15px; font-weight: 700; }
.pos-card.cost .pos-card-title { color: #4ade80; }
.pos-card.diff .pos-card-title { color: #c084fc; }
.pos-card.focus .pos-card-title { color: #7DC4FF; }
.pos-card-body { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; }

/* DANGER */
.danger-item { display: flex; align-items: center; gap: 14px; background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); border-radius: 13px; padding: 16px 20px; }
.danger-icon { font-size: 26px; }
.danger-text { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.9); }

/* PILL LIST */
.pill-item { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.06); border-radius: 12px; padding: 14px 18px; border-left: 4px solid #F5B800; }
.pill-icon { font-size: 22px; }
.pill-title { font-size: 14px; font-weight: 700; color: white; }
.pill-desc { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 1px; }

/* FIVE FORCES */
.force-btn { flex: 1; background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.15); border-radius: 13px; padding: 14px; cursor: pointer; transition: all 0.25s; text-align: center; display: flex; flex-direction: column; gap: 5px; align-items: center; font-family: inherit; color: white; }
.force-btn:hover { border-color: rgba(245,184,0,0.5); background: rgba(245,184,0,0.08); }
.force-btn.active { border-color: #F5B800; background: rgba(245,184,0,0.15); }
.force-btn-icon { font-size: 22px; }
.force-btn-title { font-size: 12px; font-weight: 700; }
.force-detail { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 18px; font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.6; }

/* COMPARE TABLE */
.compare-table { width: 100%; border-collapse: separate; border-spacing: 0; }
.compare-table th { padding: 12px 18px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; }
.compare-table th:first-child { color: rgba(255,255,255,0.5); }
.compare-table th:nth-child(2) { background: rgba(100,180,255,0.12); color: #7DC4FF; border-radius: 12px 12px 0 0; }
.compare-table th:nth-child(3) { background: rgba(245,184,0,0.12); color: #F5B800; border-radius: 12px 12px 0 0; }
.compare-table td { padding: 10px 18px; font-size: 13px; color: rgba(255,255,255,0.8); border-bottom: 1px solid rgba(255,255,255,0.07); }
.compare-table td:nth-child(2) { background: rgba(100,180,255,0.05); }
.compare-table td:nth-child(3) { background: rgba(245,184,0,0.05); }
.compare-table td:first-child { font-weight: 600; color: rgba(255,255,255,0.5); font-size: 11px; text-transform: uppercase; }

/* SPLIT */
.split-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.8); }
.split-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }

/* CHAIN */
.chain-item { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 9px; padding: 10px 16px; font-size: 13px; font-weight: 600; color: white; display: flex; align-items: center; gap: 8px; }
.chain-highlight { border-color: #F5B800; background: rgba(245,184,0,0.12); color: #F5B800; }

/* BENEFIT TILES */
.benefit-tile { background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.25s; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.benefit-tile:hover { border-color: rgba(245,184,0,0.5); background: rgba(245,184,0,0.08); }
.benefit-tile.active { border-color: #F5B800; background: rgba(245,184,0,0.15); }
.benefit-tile-icon { font-size: 32px; }
.benefit-tile-title { font-size: 14px; font-weight: 700; color: white; }
.benefit-tile-stat { font-size: 22px; font-weight: 800; color: #F5B800; }
.benefit-tile-detail { font-size: 12px; color: rgba(255,255,255,0.65); line-height: 1.5; }

/* INDUSTRY STAT */
.industry-stat { background: rgba(255,255,255,0.06); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; border: 1px solid rgba(255,255,255,0.1); }

/* TRADEOFF */
.tradeoff-box { flex: 1; border-radius: 14px; padding: 20px; text-align: center; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.tradeoff-box.yes { background: rgba(100,220,180,0.1); border: 2px solid rgba(100,220,180,0.3); }
.tradeoff-box.no { background: rgba(255,80,80,0.08); border: 2px solid rgba(255,80,80,0.25); }
.tradeoff-title { font-size: 14px; font-weight: 700; }
.tradeoff-box.yes .tradeoff-title { color: #4ade80; }
.tradeoff-box.no .tradeoff-title { color: #f87171; }
.tradeoff-items { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.8; }

/* NETWORK */
.network-card { border-radius: 18px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.network-card.hub { background: rgba(255,120,120,0.08); border: 2px solid rgba(255,120,120,0.25); }
.network-card.point { background: rgba(100,220,180,0.08); border: 2px solid rgba(100,220,180,0.25); }
.network-card-title { font-size: 17px; font-weight: 800; }
.network-card.hub .network-card-title { color: #f87171; }
.network-card.point .network-card-title { color: #4ade80; }

/* COMPLETION */
.completion-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; text-align: center; }
.trophy { font-size: 72px; filter: drop-shadow(0 8px 24px rgba(245,184,0,0.5)); animation: bounce 1s ease infinite alternate; }
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
.cert-badge { background: linear-gradient(135deg,rgba(245,184,0,0.2),rgba(245,184,0,0.05)); border: 2px solid rgba(245,184,0,0.5); border-radius: 18px; padding: 20px 36px; display: flex; align-items: center; gap: 14px; }
.cert-badge-title { font-size: 15px; font-weight: 800; color: #F5B800; }
.cert-badge-sub { font-size: 12px; color: rgba(255,255,255,0.6); }

/* ── QUIZ SCREEN ───────────────────────────────────────────────── */
.quiz-screen {

/* ════════════════════════════════════════════
   TTS HOOK
═══════════════════════════════════════════════ */
function useTTS() {
  const [muted, setMuted] = useState(false);
  const [speaking, setSpeaking] = useState(false);
  const utterRef = useRef(null);

  const speak = useCallback((text) => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    setSpeaking(false);
    if (muted) return;
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 0.95; utt.pitch = 1.0; utt.volume = 1.0;
    utt.onstart = () => setSpeaking(true);
    utt.onend = () => setSpeaking(false);
    utt.onerror = () => setSpeaking(false);
    utterRef.current = utt;
    // small delay lets React settle
    setTimeout(() => window.speechSynthesis.speak(utt), 200);
  }, [muted]);

  const stop = useCallback(() => {
    window.speechSynthesis && window.speechSynthesis.cancel();
    setSpeaking(false);
  }, []);

  const toggle = useCallback(() => {
    if (speaking) { stop(); }
    else if (utterRef.current && !muted) { window.speechSynthesis.speak(utterRef.current); setSpeaking(true); }
  }, [speaking, muted, stop]);

  const toggleMute = useCallback(() => {
    setMuted(m => { if (!m) { stop(); } return !m; });
  }, [stop]);

  return { speak, stop, speaking, muted, toggle, toggleMute };
}

const DND_ITEMS = [

function Screen4() {
  const [zones, setZones] = useState({strategy:[],competing:[],source:DND_ITEMS.map(d=>d.id)});
  const [dragging, setDragging] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [checked, setChecked] = useState(false);
  const drop = (zone) => {
    if (!dragging) return;
    const from = Object.keys(zones).find(z=>zones[z].includes(dragging));
    setZones(p=>{const n={...p};n[from]=p[from].filter(x=>x!==dragging);n[zone]=[...p[zone],dragging];return n;});
    setDragging(null);setDragOver(null);setChecked(false);
  };
  const correctCount = [...zones.strategy,...zones.competing].filter(id=>{
    const item=DND_ITEMS.find(d=>d.id===id);
    return item.correct===(zones.strategy.includes(id)?'strategy':'competing');
  }).length;
  const renderCard = (id) => {
    const item=DND_ITEMS.find(d=>d.id===id);
    const zone=zones.strategy.includes(id)?'strategy':zones.competing.includes(id)?'competing':null;
    let cls='dnd-card';
    if(checked&&zone) cls+=item.correct===zone?' correct':' incorrect';
    return <div key={id} className={cls} draggable onDragStart={()=>setDragging(id)}>{item.text}</div>;
  };
  const makeZone = (zone,color,label) => (
    <div className={`dnd-zone ${zone}-zone ${dragOver===zone?'drag-over':''}`}
      onDragOver={e=>{e.preventDefault();setDragOver(zone);}}
      onDragLeave={()=>setDragOver(null)} onDrop={()=>drop(zone)}>
      <div className="dnd-zone-header"><div className="zone-dot" style={{background:color}}></div><span style={{color:'white',fontSize:13}}>{label}</span></div>
      {zones[zone].map(id=>renderCard(id))}
    </div>
  );
  return (
    <div className="screen">
      <div className="screen-tag">Activity — Drag & Drop</div>
      <div className="screen-heading">Strategy vs. Competing</div>
      <div className="screen-sub" style={{marginBottom:10}}>Drag each statement to the correct category.</div>
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:14,minHeight:0}}>
        <div style={{display:'flex',gap:14,flex:1,minHeight:0}}>
          <div style={{flex:1,display:'flex',flexDirection:'column',gap:6,minWidth:0}}>
            <div className="dnd-source-label">Statements</div>
            <div className="dnd-cards-source">{zones.source.map(id=>renderCard(id))}</div>
          </div>
          <div style={{flex:2,display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,minWidth:0}}>
            {makeZone('strategy','#7DC4FF','Strategy → Unique')}
            {makeZone('competing','#f87171','Competing → Best')}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button className="dnd-check-btn" onClick={()=>setChecked(true)}>Check</button>
          <button className="dnd-check-btn" style={{background:'rgba(255,255,255,0.15)',color:'white'}} onClick={()=>{setZones({strategy:[],competing:[],source:DND_ITEMS.map(d=>d.id)});setChecked(false);}}>Reset</button>
          {checked&&<div style={{fontSize:14,fontWeight:600,color:correctCount===6?'#4ade80':'#F5B800'}}>{correctCount}/6 correct {correctCount===6?'🎉':''}</div>}
        </div>
      </div>
    </div>
  );
}

function QuizScreen({ quizNum, questions, onComplete }) {
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const allAnswered = questions.every((_,i) => answers[i] !== undefined);
  const score = submitted ? questions.filter((q,i)=>answers[i]===q.correct).length : 0;

  const select = (qIdx, optIdx) => {
    if (submitted) return;
    setAnswers(p=>({...p,[qIdx]:optIdx}));
  };

  return (
    <div className="quiz-screen">
      <div className="quiz-header-band">
        <div className="quiz-badge">Quiz {quizNum}</div>
        <div>
          <div className="quiz-title">Knowledge Check</div>
          <div className="quiz-subtitle">Answer all questions, then submit.</div>
        </div>
      </div>

      <div className="quiz-body">
        {submitted && (
          <div className="quiz-score-banner">
            <div className="quiz-score-num">{score}/{questions.length}</div>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:'white'}}>{score===questions.length?'Perfect score! 🎉':score>0?'Good effort — review the explanations below.':'Keep studying — you\'ve got this!'}</div>
              <div className="quiz-score-label">{score===questions.length?'All answers correct.':'Check the highlighted answers.'}</div>
            </div>
          </div>
        )}

        {questions.map((q,qi)=>(
          <div key={qi} className="quiz-question-block">
            <div className="quiz-q-num">Question {qi+1} of {questions.length}</div>
            <div className="quiz-q-text">{q.text}</div>
            <div className="quiz-options">
              {q.options.map((opt,oi)=>{
                let cls='quiz-option';
                if(answers[qi]===oi) cls+=' selected';
                if(submitted && oi===q.correct) cls+=' correct';
                if(submitted && answers[qi]===oi && oi!==q.correct) cls+=' wrong';
                return (
                  <button key={oi} className={cls} onClick={()=>select(qi,oi)}>
                    <div className="quiz-option-letter">{['A','B','C','D'][oi]}</div>
                    {opt}
                  </button>
                );
              })}
            </div>
            {submitted && (
              <div className={`quiz-feedback ${answers[qi]===q.correct?'ok':'bad'}`}>
                {answers[qi]===q.correct ? '✓ Correct! ' : '✗ Incorrect. '}{q.explanation}
              </div>
            )}
          </div>
        ))}

        {!submitted ? (
          <button className="quiz-submit-btn" disabled={!allAnswered} onClick={()=>setSubmitted(true)}>
            Submit Answers →
          </button>
        ) : (
          <button className="quiz-submit-btn" onClick={onComplete} style={{background:'#4ade80',color:'#0d2000'}}>
            Continue Course →
          </button>
        )}
      </div>
    </div>
  );
}

  "Low-cost carriers focus on efficiency, while full-service carriers focus on differentiation.",
  "Southwest's point-to-point model reduces delays and costs compared to hub-and-spoke systems.",
  "The airline industry is historically low-profit, yet Southwest stands out due to its strategic model.",
  "Quiz four — let's check your understanding of the Southwest Airlines case.",
  "Southwest aligns all activities to support its low-cost strategy.",
  "Fast turnaround is a key operational advantage that drives cost savings and efficiency. Click each tile to explore.",
  "Southwest's success comes from making clear trade-offs and ensuring all activities fit together.",
  "Congratulations! You have completed the Business Strategy Course. Well done!"
];

const SECTION_NAMES = [
  'Introduction','Introduction','Core Concepts','Core Concepts','Quiz 1',
  'Strategy Levels','Strategy Levels','Business Strategy','Business Strategy','Quiz 2',
  'Positioning','Positioning','Cost Leadership','Five Forces','Quiz 3',
  'Southwest Case','Southwest Case','Southwest Case','Southwest Case','Quiz 4',
  'Southwest Case','Southwest Case','Southwest Case','Completion'
];

/* ════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════ */
function App() {
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    window.__setSlideIdx = setIdx;
    if (window.__pendingSlide !== null && window.__pendingSlide !== undefined) {
      setIdx(window.__pendingSlide);
      window.__pendingSlide = null;
    }
    return () => { window.__setSlideIdx = null; };
  }, [setIdx]);
  const { speak, stop, speaking, muted, toggleMute } = useTTS();
  const TOTAL = 24; // 20 content + 4 quizzes

  // Build item list: content screens interleaved with quizzes
  // Indices: 0-3=Screens1-4, 4=Quiz1, 5-8=Screens5-8, 9=Quiz2,
  //          10-13=Screens9-12, 14=Quiz3, 15-18=Screens13-16, 19=Quiz4,
  //          20-23=Screens17-20
  const QUIZ_POSITIONS = { 4:'q1', 9:'q2', 14:'q3', 19:'q4' };

  useEffect(() => {
    speak(VOICEOVERS[idx] || '');
    return () => stop();
  }, [idx]);

  const goNext = () => setIdx(s => Math.min(s+1, TOTAL-1));
  const goPrev = () => setIdx(s => Math.max(s-1, 0));

  const progress = (idx / (TOTAL-1)) * 100;
  const isQuiz = QUIZ_POSITIONS[idx];

  const contentScreens = [
    <Screen1 onNext={goNext}/>, // 0
    <Screen2/>,                 // 1
    <Screen3/>,                 // 2
    <Screen4/>,                 // 3
    null,                       // 4 = Quiz1
    <Screen5/>,                 // 5
    <Screen6/>,                 // 6
    <Screen7/>,                 // 7
    <Screen8/>,                 // 8
    null,                       // 9 = Quiz2
    <Screen9/>,                 // 10
    <Screen10/>,                // 11
    <Screen11/>,                // 12
    <Screen12/>,                // 13
    null,                       // 14 = Quiz3
    <Screen13/>,                // 15
    <Screen14/>,                // 16
    <Screen15/>,                // 17
    <Screen16/>,                // 18
    null,                       // 19 = Quiz4
    <Screen17/>,                // 20
    <Screen18/>,                // 21
    <Screen19/>,                // 22
    <Screen20 onRestart={()=>setIdx(0)}/>, // 23
  ];

  const currentContent = isQuiz
    ? <QuizScreen {...QUIZZES[isQuiz]} onComplete={goNext}/>
    : contentScreens[idx];

  return (
    <div className="course-shell">
      <GeoBg/>

      {/* TOP BAR */}
      <div className="top-bar">
        <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
          <div className="logo-icon">BS</div>
          <div>
            <div className="course-title-bar">Business Strategy</div>
            <div className="section-tag">{SECTION_NAMES[idx]}</div>
          </div>
        </div>
        <div style={{width:1,height:28,background:'rgba(255,255,255,0.12)',flexShrink:0}}/>

        <div className="progress-area">
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${progress}%`}}/>
          </div>
          <div className="progress-label">{Math.round(progress)}%</div>
        </div>

        <div className="screen-counter">{idx+1}/{TOTAL}</div>

        {/* TTS Controls */}
        <div className="tts-controls">
          {speaking && !muted && (
            <div className="tts-wave">
              <span/><span/><span/><span/><span/>
            </div>
          )}
          <button className={`tts-btn ${muted?'muted':''}`} onClick={toggleMute} title={muted?'Unmute narration':'Mute narration'}>
            {muted ? '🔇' : '🔊'}
          </button>
        </div>
      </div>

      {/* MAIN */}
      <div className="screen-content" key={idx}>
        {currentContent}
      </div>

      {/* BOTTOM NAV */}
      <div className="bottom-nav">
        <button className="nav-btn prev" onClick={goPrev} disabled={idx===0}>← Back</button>
        <div className="vo-box">🎙 {VOICEOVERS[idx]}</div>
        {!isQuiz && (
          <button className="nav-btn next" onClick={goNext} disabled={idx===TOTAL-1}>
            {idx===TOTAL-2?'Finish ✓':'Next →'}
          </button>
        )}
        {isQuiz && <div style={{width:100}}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
